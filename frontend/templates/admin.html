<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <title>Admin Dashboard - Telegram Film</title>
    <style type="text/tailwindcss">
        @theme {
            --color-primary: #e50914;
            --color-glass: rgba(255, 255, 255, 0.03);
            --color-glass-border: rgba(255, 255, 255, 0.08);
        }
        @utility glass {
            background-color: var(--color-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-glass-border);
        }
        body { font-family: 'Outfit', sans-serif; background-color: #080808; color: white; }
    </style>
</head>

<body class="min-h-full p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Cinema <span class="text-primary">Admin</span></h1>
                <p class="text-white/40 text-sm">Manage your movie library effortlessly</p>
            </div>
            <div id="server-status" class="px-4 py-2 rounded-full glass text-xs font-medium flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                Server Online
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass p-6 rounded-3xl">
                <p class="text-white/40 text-xs font-semibold uppercase tracking-widest mb-1">Total Library</p>
                <h2 id="stat-movies" class="text-4xl font-bold">0</h2>
            </div>
            <div class="glass p-6 rounded-3xl">
                <p class="text-white/40 text-xs font-semibold uppercase tracking-widest mb-1">Upload Status</p>
                <div id="upload-container" class="space-y-2">
                    <div class="flex justify-between items-end">
                        <h2 id="stat-upload" class="text-lg font-bold text-white/80">Idle</h2>
                        <span id="stat-speed" class="text-xs text-primary font-mono hidden">0 MB/s</span>
                    </div>
                    <div id="progress-bar-container"
                        class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden hidden">
                        <div id="progress-bar-fill" class="bg-primary h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
            <div class="glass p-6 rounded-3xl md:col-span-1">
                <p class="text-white/40 text-xs font-semibold uppercase tracking-widest mb-1">Quick Action</p>
                <button onclick="document.getElementById('upload-modal').classList.remove('hidden')"
                    class="w-full bg-primary hover:bg-primary/80 text-white font-bold py-3 rounded-2xl transition-all">
                    + Add New Movies
                </button>
            </div>
        </div>

        <!-- Catalog Section -->
        <div class="glass rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h3 class="font-bold">Movie Catalog</h3>
                <div class="text-xs text-white/40" id="sync-time">Last synced: Just now</div>
            </div>

            <!-- Desktop Table View -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-white/40 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">Title</th>
                            <th class="px-6 py-4">File ID (Telegram)</th>
                            <th class="px-6 py-4">Year</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="movie-list" class="divide-y divide-white/5">
                        <!-- Movies injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Mobile Card View -->
            <div id="movie-list-mobile" class="md:hidden divide-y divide-white/5">
                <!-- Mobile cards injected here -->
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="glass w-full max-w-md p-8 rounded-[40px] relative">
            <button onclick="document.getElementById('upload-modal').classList.add('hidden')"
                class="absolute top-6 right-6 text-white/40 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <h2 class="text-2xl font-bold mb-2">Scan Directory</h2>
            <p class="text-white/40 text-sm mb-6">Enter the absolute path to your movie folder.</p>

            <input id="scan-path" type="text" placeholder="e.g. D:\Movies\Action"
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all mb-6">

            <button id="btn-start-scan" onclick="startScan()"
                class="w-full bg-primary hover:bg-primary/80 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span>Start Scanning & Uploading</span>
            </button>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>

</html>
